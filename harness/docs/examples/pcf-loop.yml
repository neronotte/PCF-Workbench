name: PCF Build Loop

# ---------------------------------------------------------------------------
# PCF Workbench AI Build Loop — copy this file into your PCF project at
# .github/workflows/pcf-loop.yml and adjust the variables under `env:`.
#
# What it does on every PR (and push to main):
#   1. Installs @pcfworkbench/cli from npm (no repo clone needed).
#   2. Builds your PCF control with `npm run build`.
#   3. Runs `npx pcfworkbench loop` against the built bundle.
#   4. Uploads report.json + screenshot.png as a workflow artifact.
#   5. Posts a sticky comment on the PR with pass/fail + perf-budget summary.
#   6. Fails the workflow (red ❌) if the loop reports `warn` or `fail`.
#
# Full reference: https://github.com/jaduplesms/PCF-Workbench/blob/main/harness/docs/ai-build-loop.md
# ---------------------------------------------------------------------------

on:
  pull_request:
    paths:
      - '**/ControlManifest.Input.xml'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.css'
      - '**/test-scenarios.json'
      - '.github/workflows/pcf-loop.yml'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pcf-loop-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── EDIT THESE ─────────────────────────────────────────────────────────
  # Project root that contains package.json with `npm run build`.
  PCF_PROJECT_DIR: '.'
  # Control dir (the one containing ControlManifest.Input.xml).
  PCF_CONTROL_DIR: './MyControl'
  # Pin the published CLI version. Use 'latest' for the current release (default)
  # or pin to a specific version (e.g. '1.0.0') for reproducible CI.
  PCF_WORKBENCH_VERSION: 'latest'
  # OPTIONAL: name of a scenario in test-scenarios.json to auto-load before
  # the control mounts. Without this the control renders with manifest
  # defaults (often blank) — which is rarely what you want to assert on.
  # Recommended: commit a "ci-smoke" scenario alongside the control with
  # representative property values, then point this at it.
  PCF_SCENARIO: ''
  # ───────────────────────────────────────────────────────────────────────

jobs:
  loop:
    name: AI Build Loop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PCF project
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system deps (libsecret for keytar)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install project deps
        working-directory: ${{ env.PCF_PROJECT_DIR }}
        run: npm ci

      - name: Install @pcfworkbench/cli
        working-directory: ${{ env.PCF_PROJECT_DIR }}
        run: npm i -D @pcfworkbench/cli@${{ env.PCF_WORKBENCH_VERSION }}

      - name: Build PCF control
        working-directory: ${{ env.PCF_PROJECT_DIR }}
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: ${{ env.PCF_PROJECT_DIR }}
        run: npx playwright install --with-deps chromium

      - name: Run AI build loop
        id: loop
        working-directory: ${{ env.PCF_PROJECT_DIR }}
        run: |
          npx pcfworkbench loop \
            --path "${PCF_CONTROL_DIR}" \
            --skip-build \
            --out "${GITHUB_WORKSPACE}/pcf-loop-reports" \
            ${PCF_SCENARIO:+--scenario "${PCF_SCENARIO}"}
        continue-on-error: true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcf-loop-reports
          path: pcf-loop-reports/
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportPath = path.join('pcf-loop-reports', 'report.json');
            if (!fs.existsSync(reportPath)) {
              core.warning('report.json not found, skipping PR comment');
              return;
            }

            const r = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const icon = { pass: '✅', warn: '⚠️', fail: '❌' };
            const status = r.summary?.status ?? 'fail';
            const headline = r.summary?.headline ?? '(no headline)';

            const buildLine = r.build?.ok
              ? '✅ ok'
              : `❌ ${(r.build?.errors ?? []).length} error(s)`;
            const renderLine = r.harness?.ok
              ? '✅ rendered'
              : `❌ ${r.harness?.error ?? 'did not render'}`;
            const leaks = r.harness?.report?.leaks?.length ?? 0;
            const leaksLine = leaks === 0 ? '✅ none' : `⚠️ ${leaks} leak(s)`;

            let budgetLine = '— (no budget configured)';
            if (r.budget) {
              if (r.budget.status === 'pass') {
                budgetLine = '✅ all metrics within budget';
              } else {
                const vs = (r.budget.violations ?? [])
                  .map(v => `${v.severity === 'fail' ? '❌' : '⚠️'} ` +
                    `\`${v.metric}\` ${v.actual} (${v.severity} >${v.budget})`)
                  .join('<br>');
                budgetLine = `${icon[r.budget.status]} ${r.budget.status}<br>${vs}`;
              }
            }

            const perf = r.harness?.report?.performance ?? {};
            const lifecycle = r.harness?.report?.lifecycle ?? {};
            const perfLine =
              `firstUpdateView: ${lifecycle.firstUpdateViewMs ?? '—'}ms · ` +
              `avgRender: ${perf.avgRenderTimeMs ?? '—'}ms · ` +
              `renders: ${perf.renderCount ?? 0}`;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/` +
              `${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `<!-- pcf-build-loop -->`,
              `### 🤖 PCF Build Loop — ${icon[status]} ${status.toUpperCase()}`,
              ``,
              `**${headline}**`,
              ``,
              `| Check | Result |`,
              `| --- | --- |`,
              `| Build | ${buildLine} |`,
              `| Render | ${renderLine} |`,
              `| Leaks | ${leaksLine} |`,
              `| Budget | ${budgetLine} |`,
              `| Perf | ${perfLine} |`,
              ``,
              `📦 Full report + screenshot: [download artifact](${runUrl}#artifacts)`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('<!-- pcf-build-loop -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if loop did not pass
        if: steps.loop.outcome != 'success'
        run: |
          echo "::error::PCF build loop returned non-zero exit code. See artifact for details."
          exit 1
