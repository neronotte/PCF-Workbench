name: PCF Build Loop (self-test)

# Runs the AI Build Loop against samples/ConformanceTester on every PR and
# push to main. This is the workbench's own dogfood / self-test of the
# recipe documented in harness/docs/ai-build-loop.md. A user-facing copy
# of the same workflow lives at harness/docs/examples/pcf-loop.yml.

on:
  pull_request:
    paths:
      - 'harness/**'
      - 'samples/ConformanceTester/**'
      - '.github/workflows/pcf-loop.yml'
  push:
    branches: [main]
    paths:
      - 'harness/**'
      - 'samples/ConformanceTester/**'
      - '.github/workflows/pcf-loop.yml'
  workflow_dispatch:

concurrency:
  group: pcf-loop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  loop:
    name: ConformanceTester
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Linux system deps (libsecret for keytar)
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install harness deps
        working-directory: harness
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: harness
        run: npx playwright install --with-deps chromium

      - name: Install sample deps
        working-directory: samples/ConformanceTester
        run: npm ci

      - name: Build sample control
        working-directory: samples/ConformanceTester
        run: npm run build

      - name: Run AI build loop
        id: loop
        working-directory: harness
        run: |
          npm run harness -- loop \
            --path ../samples/ConformanceTester/ConformanceTester \
            --skip-build \
            --out ./pcf-loop-reports
        continue-on-error: true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pcf-loop-reports
          path: harness/pcf-loop-reports/
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportPath = path.join(
              'harness', 'pcf-loop-reports', 'report.json'
            );
            if (!fs.existsSync(reportPath)) {
              core.warning('report.json not found, skipping PR comment');
              return;
            }

            const r = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const icon = { pass: '✅', warn: '⚠️', fail: '❌' };
            const status = r.summary?.status ?? 'fail';
            const headline = r.summary?.headline ?? '(no headline)';

            const buildLine = r.build?.ok
              ? '✅ ok'
              : `❌ ${(r.build?.errors ?? []).length} error(s)`;
            const renderLine = r.harness?.ok
              ? '✅ rendered'
              : `❌ ${r.harness?.error ?? 'did not render'}`;
            const leaks = r.harness?.report?.leaks?.length ?? 0;
            const leaksLine = leaks === 0
              ? '✅ none'
              : `⚠️ ${leaks} leak(s)`;

            let budgetLine = '— (no budget configured)';
            if (r.budget) {
              if (r.budget.status === 'pass') {
                budgetLine = '✅ all metrics within budget';
              } else {
                const vs = (r.budget.violations ?? [])
                  .map(v => `${v.severity === 'fail' ? '❌' : '⚠️'} ` +
                    `\`${v.metric}\` ${v.actual} (${v.severity} >${v.budget})`)
                  .join('<br>');
                budgetLine = `${icon[r.budget.status]} ${r.budget.status}<br>${vs}`;
              }
            }

            const perf = r.harness?.report?.performance ?? {};
            const lifecycle = r.harness?.report?.lifecycle ?? {};
            const perfLine =
              `firstUpdateView: ${lifecycle.firstUpdateViewMs ?? '—'}ms · ` +
              `avgRender: ${perf.avgRenderTimeMs ?? '—'}ms · ` +
              `renders: ${perf.renderCount ?? 0}`;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/` +
              `${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `<!-- pcf-build-loop -->`,
              `### 🤖 PCF Build Loop — ${icon[status]} ${status.toUpperCase()}`,
              ``,
              `**${headline}**`,
              ``,
              `| Check | Result |`,
              `| --- | --- |`,
              `| Build | ${buildLine} |`,
              `| Render | ${renderLine} |`,
              `| Leaks | ${leaksLine} |`,
              `| Budget | ${budgetLine} |`,
              `| Perf | ${perfLine} |`,
              ``,
              `📦 Full report + screenshot: [download artifact](${runUrl}#artifacts)`,
            ].join('\n');

            // Find existing sticky comment (matches <!-- pcf-build-loop -->)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('<!-- pcf-build-loop -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if loop reported fail
        run: |
          STATUS=$(jq -r '.summary.status' harness/pcf-loop-reports/report.json)
          echo "Loop summary.status = $STATUS"
          if [ "$STATUS" = "fail" ]; then
            echo "::error::PCF build loop reported fail."
            exit 1
          fi
